packages:
  - apps/*
  - packages/*
  - packages/ui/*
  - packages/connectors/*

catalog:
  vite: npm:@voidzero-dev/vite-plus-core@latest
  vitest: npm:@voidzero-dev/vite-plus-test@latest
  vite-plus: latest
  typescript: ^5.7.3
  effect: ^3.18.6
  drizzle-orm: ^0.36.0
  drizzle-kit: ^0.30.0
  better-sqlite3: ^11.5.0
  "@types/better-sqlite3": ^7.6.11

overrides:
  vite: "catalog:"
  vitest: "catalog:"

peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: "*"
    vitest: "*"
